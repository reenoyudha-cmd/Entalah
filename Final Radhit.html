<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Radhit</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hijau-tua: #0a2e0a;
            --hijau-cerah: #2d6a4f;
            --hijau-aksen: #1b4332;
            --putih-transparan: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #081c15, #1b4332, #081c15);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 850px;
            text-align: center;
            padding: 20px;
        }

        .page {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            flex-direction: column;
            align-items: center;
        }

        .active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        /* Tombol Next */
        .btn-next {
            background: #40916c;
            color: white;
            border: none;
            padding: 12px 50px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        .btn-next:hover {
            transform: scale(1.05);
            background: #52b788;
        }

        /* PAGE 1 */
        .banner-box {
            background: var(--putih-transparan);
            backdrop-filter: blur(10px);
            padding: 35px 70px;
            border-radius: 0 0 25px 25px; /* Sudut tumpul di bawah */
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
        }

        /* PAGE 2 - SURAT */
        .envelope {
            width: 280px;
            height: 180px;
            background: #fdfcf0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .red-btn {
            width: 55px;
            height: 55px;
            background: #d00000;
            border-radius: 50%;
            border: 4px solid #800000;
            z-index: 5;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        #letterPaper {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: #ffffff;
            color: #222;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            z-index: 10;
            text-align: left;
            animation: stampIn 0.5s ease-out forwards;
        }

        @keyframes stampIn {
            from { transform: translate(-50%, -100%) scale(1.2); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #letterPaper h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--hijau-cerah);
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        #letterPaper p {
            line-height: 1.8;
            margin-bottom: 20px;
        }

        /* PAGE 3 */
        .final-grid {
            display: flex;
            align-items: center;
            gap: 45px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .photo-frame {
            border: 12px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            transform: rotate(-3deg);
            max-width: 300px;
            transition: 0.5s;
        }

        .photo-frame img {
            width: 100%;
            display: block;
        }

        .grad-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #d8f3dc;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .final-grid { flex-direction: column; text-align: center; }
            .grad-title { font-size: 3rem; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="Gorillaz - Feel Good Inc. (Official Video).mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="p1" class="page active">
            <div class="banner-box">
                <h1>Untuk Radhit</h1>
            </div>
            <button class="btn-next" onclick="initJourney()">Next</button>
        </div>

        <div id="p2" class="page">
            <div class="envelope" onclick="openSurat()">
                <div class="red-btn"></div>
            </div>
            <p style="margin-top: 20px; font-style: italic;">Klik tombol merah untuk membuka pesan</p>

            <div id="letterPaper">
                <h2>Halo Radhit,</h2>
                <p>
                    Gak kerasa kita udah temenan selama 3 tahun ya. Aku mau ngucapin 
                    <b>Happy Graduation yaa!</b> Berterima kasih banget udah mau jadi temenku 
                    mulai dari game fnaf dan kelas ini kita sekelas. Semoga kita ketemu lagi yaa.
                </p>
                <button class="btn-next" style="width: 100%;" onclick="goFinal()">Next</button>
            </div>
        </div>

        <div id="p3" class="page">
            <div class="final-grid">
                <div class="photo-frame">
                    <img src="Zean.jpg" alt="Foto Radhit">
                </div>
                <h1 class="grad-title">Happy Graduation</h1>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('music');

        function initJourney() {
            // Set volume 100% dan putar musik
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Audio play blocked"));
            
            changePage('p1', 'p2');
        }

        function openSurat() {
            document.getElementById('letterPaper').style.display = 'block';
        }

        function goFinal() {
            document.getElementById('letterPaper').style.display = 'none';
            changePage('p2', 'p3');
        }

        function changePage(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(showId).classList.add('active');
            }, 100);
        }
    </script>
</body>
</html>
