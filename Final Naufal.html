<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Naufal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hitam-gelap: #0a0a0a;
            --hitam-panel: #161616;
            --merah-aksen: #e63946;
            --putih-transparan: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle, #1a1a1a 0%, var(--hitam-gelap) 100%);
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            text-align: center;
            padding: 20px;
        }

        /* Navigasi Halaman */
        .page {
            display: none;
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            flex-direction: column;
            align-items: center;
        }

        .active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        /* Tombol Next Umum */
        .btn-next {
            background: linear-gradient(45deg, var(--merah-aksen), #ff4d6d);
            color: white;
            border: none;
            padding: 14px 55px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(230, 57, 70, 0.4);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.6);
        }

        /* PAGE 1 - HEADER */
        .banner-rect {
            background: var(--putih-transparan);
            backdrop-filter: blur(15px);
            padding: 40px 80px;
            border-radius: 0 0 35px 35px; /* Sudut tumpul di bawah */
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .banner-rect h1 {
            font-size: 3.8rem;
            font-weight: 700;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* PAGE 2 - SURAT */
        .envelope {
            width: 300px;
            height: 190px;
            background: #dcdcdc;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 2px solid #bbb;
        }

        .red-dot {
            width: 60px;
            height: 60px;
            background: var(--merah-aksen);
            border-radius: 50%;
            border: 5px solid #9b2226;
            z-index: 5;
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.5);
        }

        #letterOverlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 550px;
            background: #ffffff;
            color: #1a1a1a;
            padding: 45px;
            border-radius: 5px;
            box-shadow: 0 0 150px rgba(0,0,0,0.9);
            z-index: 100;
            text-align: left;
            animation: letterSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes letterSlide {
            0% { transform: translate(-50%, 50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #letterOverlay h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--merah-aksen);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        #letterOverlay p {
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        /* PAGE 3 - HASIL AKHIR */
        .final-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            background: rgba(255, 255, 255, 0.03);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .photo-frame {
            border: 15px solid white;
            border-bottom: 40px solid white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transform: rotate(-4deg);
            max-width: 320px;
            transition: 0.5s;
        }

        .photo-frame img {
            width: 100%;
            display: block;
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .grad-text {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(230, 57, 70, 0.8);
        }

        @media (max-width: 768px) {
            .final-grid { flex-direction: column; text-align: center; }
            .grad-text { font-size: 3rem; }
            .banner-rect h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Gorillaz - Feel Good Inc. (Official Video).mp3" type="audio/mpeg
