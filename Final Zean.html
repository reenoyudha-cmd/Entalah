<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Zean</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --merah-utama: #d90429;
            --merah-gelap: #800e13;
            --putih-halus: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #641212, var(--merah-utama), #480ca8);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        /* Navigasi Halaman */
        .page {
            display: none;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s ease;
            flex-direction: column;
            align-items: center;
        }

        .active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        /* Halaman 1 */
        .banner {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px 60px;
            border-radius: 20px; /* Sudut tumpul */
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
        }

        .btn-next {
            background: white;
            color: var(--merah-utama);
            border: none;
            padding: 12px 50px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-next:hover {
            transform: translateY(-5px);
            background: var(--merah-utama);
            color: white;
        }

        /* Halaman 2: Surat */
        .envelope-wrapper {
            width: 300px;
            height: 200px;
            background: #e0e0e0;
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .red-button {
            width: 60px;
            height: 60px;
            background: red;
            border-radius: 50%;
            border: 4px solid #b30000;
            z-index: 5;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        .letter-reveal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 500px;
            background: white;
            color: #222;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            z-index: 10;
            animation: paperIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
        }

        @keyframes paperIn {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }

        .letter-reveal h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--merah-utama);
            margin-bottom: 15px;
            font-size: 2.2rem;
        }

        .letter-reveal p {
            line-height: 1.8;
            margin-bottom: 20px;
        }

        /* Halaman 3: Foto & Grad */
        .final-content {
            display: flex;
            align-items: center;
            gap: 40px;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .frame {
            border: 15px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transform: rotate(-3deg);
            max-width: 320px;
        }

        .frame img {
            width: 100%;
            display: block;
        }

        .grad-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .final-content { flex-direction: column; }
            .grad-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Gorillaz - Feel Good Inc. (Official Video).mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="page1" class="page active">
            <div class="banner">
                <h1>Untuk Zean</h1>
            </div>
            <button class="btn-next" onclick="startApp()">Next</button>
        </div>

        <div id="page2" class="page">
            <div class="envelope-wrapper" onclick="openLetter()">
                <div class="red-button"></div>
            </div>
            <p style="margin-top: 20px; font-style: italic;">Klik tombol merah untuk melihat pesan</p>

            <div id="letter" class="letter-reveal">
                <h2>Halo Zean,</h2>
                <p>
                    Gak kerasa kita udah temenan selama 3 tahun ya. Aku mau ngucapin Happy Graduation yaa! 
                    Berterima kasih banget udah mau jadi temenku dan dan 2 tahun ini kita sekelas. 
                    Semoga kita ketemu lagi yaa.
                </p>
                <button class="btn-next" style="width: 100%; border: 1px solid #ddd;" onclick="goFinal()">Next</button>
            </div>
        </div>

        <div id="page3" class="page">
            <div class="final-content">
                <div class="frame">
                    <img src="Zean.jpg" alt="Foto Zean">
                </div>
                <h1 class="grad-title">Happy Graduation</h1>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');

        function startApp() {
            // Putar musik (volume 100%)
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Autoplay blocked, waiting for interaction"));
            
            showPage('page1', 'page2');
        }

        function openLetter() {
            document.getElementById('letter').style.display = 'block';
        }

        function goFinal() {
            document.getElementById('letter').style.display = 'none';
            showPage('page2', 'page3');
        }

        function showPage(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(showId).classList.add('active');
            }, 100);
        }
    </script>
</body>
</html>
