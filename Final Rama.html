<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Rama</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --merah-tua: #8b0000;
            --merah-terang: #ff4d4d;
            --merah-aksen: #d90429;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #4a0000, var(--merah-tua), #2b0000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 850px;
            text-align: center;
            padding: 20px;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1s ease-in-out;
        }

        .active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PAGE 1: Untuk Rama */
        .title-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px 60px;
            border-radius: 20px; /* Sudut tumpul */
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .btn-next {
            background: var(--merah-terang);
            color: white;
            border: none;
            padding: 12px 50px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4);
            text-transform: uppercase;
        }

        .btn-next:hover {
            transform: scale(1.1);
            background: white;
            color: var(--merah-tua);
        }

        /* PAGE 2: Surat */
        .envelope {
            width: 280px;
            height: 180px;
            background: #f0f0f0;
            border-radius: 5px;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .red-dot {
            width: 50px;
            height: 50px;
            background: #ff0000;
            border-radius: 50%;
            border: 4px solid #8b0000;
            z-index: 2;
            transition: 0.3s;
        }

        #letterPaper {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            z-index: 10;
            text-align: left;
            line-height: 1.8;
        }

        #letterPaper h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--merah-tua);
            margin-bottom: 20px;
            font-size: 2.2rem;
        }

        /* PAGE 3: Final */
        .final-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .photo-frame {
            border: 12px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: rotate(-3deg);
            max-width: 300px;
            transition: 0.5s;
        }

        .photo-frame img {
            width: 100%;
            display: block;
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .grad-text {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #ffcccc;
            text-shadow: 2px 2px 15px rgba(255, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .final-layout { flex-direction: column; }
            .grad-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Perunggu - 33x (Video Lirik).mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="page1" class="page active">
            <div class="title-box">
                <h1>Untuk Rama</h1>
            </div>
            <button class="btn-next" onclick="startJourney()">Next</button>
        </div>

        <div id="page2" class="page">
            <div class="envelope" onclick="openLetter()">
                <div class="red-dot"></div>
            </div>
            <p style="margin-top: 20px;">Klik tombol merah untuk buka surat</p>
            
            <div id="letterPaper">
                <h2>Halo Rama</h2>
                <p>
                    Dah ga kerasa kita udah temenan selama 3 tahun ya, aku mau ngucapin <b>Happy Graduation</b> yaa. 
                    Berterima kasih banget udah mau jadi temenku mulai dari basket dan kelas 9 ini kita sekelas. 
                    Semoga kita ketemu lagi yaa.
                </p>
                <button class="btn-next" style="width: 100%; margin-top: 20px;" onclick="goPage3()">Next</button>
            </div>
        </div>

        <div id="page3" class="page">
            <div class="final-layout">
                <div class="photo-frame">
                    <img src="Rama.jpg" alt="Foto Rama">
                </div>
                <h2 class="grad-text">Happy Graduation!</h2>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        audio.volume = 1.0; // Volume 100%

        function startJourney() {
            // Memulai lagu saat interaksi pertama
            audio.play().catch(error => console.log("Autoplay dicegah oleh browser"));
            
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
        }

        function openLetter() {
            const paper = document.getElementById('letterPaper');
            paper.style.display = 'block';
            paper.style.animation = 'fadeIn 0.5s ease-in-out';
        }

        function goPage3() {
            document.getElementById('letterPaper').style.display = 'none';
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page3').classList.add('active');
        }
    </script>
</body>
</html>
